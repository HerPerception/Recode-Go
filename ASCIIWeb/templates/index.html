<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCII Art Web</title>
    <style>
      body {
    background-color: #f0f0f0;
    font-family: system-ui, sans-serif;
}
       .container {
    max-width: 600px;
    margin: 40px auto 0 auto;
    /* padding: 20px; */
    background-color: white;
    padding: 32px;
    border-radius: 8px;
}

.form-label {
    display: block;
    margin-bottom: 8px;
    font-size: 20px;
}


p {
    margin-bottom: 0;
}
button {
    background-color: blueviolet;
    margin-top: 16px;
    padding: 10px 24px;
    border-radius: 4px;
    border: none;
    color: white
}

button:hover {
    cursor: pointer;
    background-color: darkmagenta;
}

textarea {
    width: 100%;
    box-sizing: border-box;
    margin-bottom: 16px;
    border: 2px solid #ccc;
    border-radius: 4px;
    padding: 8px;
}

textarea:focus {
    outline: none;
    border: 2px solid blueviolet;
}
    #output {
    overflow-x: auto;
    margin-top: 0;
}


    </style>    
</head>

<body>
    <div class="container">
    <h2>ASCII Art Generator</h2>
    <form action="/ascii-art" method="post" target="_self">
        <label class="form-label" for="text">Type text here</label>
        <textarea name="text" id="text" placeholder="Enter Text" required>{{.Text}}</textarea>
       <label class="form-label" for="banner">Choose Banner Style</label>
        <input type="radio" name="banner" id="standard" value="standard" checked>
        <label for="standard">Standard</label><br>
        <input type="radio" name="banner" id="shadow" value="shadow" >
        <label for="shadow">Shadow</label><br>
        <input type="radio" name="banner" id="thinkertoy" value="thinkertoy">
        <label for="thinkertoy">Thinkertoy</label><br>

        <button type="submit">Generate</button>
    </form>
    <p><strong>Result:</strong></p>
    <pre id="output">{{.Result}}</pre>
     </div>
</body>
</html>
