<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCII Art Web</title>
   <style>
body {
  background-color: rgb(110, 233, 61);
}
</style>
</head>
<body>
    <form action="/ascii-art" method="POST">
        <h1>ASCII Art Generator</h1>

        <label for="text">Type  text here:</label><br><br>
        <textarea id="text" name="text" rows="3" cols="45" required>{{.UserText}}</textarea>
        <br><br>

        <label>Choose Banner Style:</label><br>
        <input type="radio" id="standard" name="banner" value="standard" checked>
        <label for="standard">Standard</label><br>
        <input type="radio" id="shadow" name="banner" value="shadow">
        <label for="shadow">Shadow</label><br>
        <input type="radio" id="thinkertoy" name="banner" value="thinkertoy">
        <label for="thinkertoy">Thinkertoy</label><br><br>

        <button type="submit">Generate ASCII Art</button>
    </form>
    
    <h3>Your Result:</h3>
    <pre>{{.ASCIIArt}}</pre>

</body>
</html>
