<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCII Art Web</title>
    <style>
        textarea {
  width: 100%;
  height: 150px;
  padding: 12px;
  box-sizing: border-box;
  border: 2px solid #ccc;
  border-radius: 4px;
  background-color: #f8f8f8;
  font-size: 16px;
  resize: none;
}

input {
  width: 100%;
  border: none;
  border-radius: 4px;
  background-color: #f1f1f1;
}

input[type=button], input[type=submit] {
  background-color: #04AA6D;
  border: none;
  color: white;
  padding: 16px 32px;
  text-decoration: none;
  margin: 4px 2px;
  cursor: pointer;
}
    </style>
</head>
<body>
    <form action="/ascii-art" method="post">
        <h1>ASCII Art Generator</h1>

        <h3>Type Text Below</h3>
        <textarea id="text" rows="3" cols="45" name="text" required>{{.UserText}}</textarea>
        <br>
        <label for="banner">Choose Banner Style</label>
        <br>
        <input type="radio" name="banner" id="standard" value="standard.txt" checked>
        <label for="standard">standard</label>
        <input type="radio" name="banner" id="shadow" value="shadow.txt">
        <label for="shadow">shadow</label>
        <input type="radio" name="banner" id="thinkertoy" value="thinkertoy.txt">
        <label for="standard">thinkertoy</label>
        
        <br>

        <button type="submit">generate</button>
    </form>
    <pre>{{.Result}}</pre>
</body>
</html>
